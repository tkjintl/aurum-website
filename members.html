<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<meta name="theme-color" content="#0a0a0a">
<title>Member Log-In · The Aurum Century Club</title>
<meta name="description" content="Partners log-in.">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%230a0a0a'/><rect x='4' y='4' width='24' height='24' fill='none' stroke='%23C5A572' stroke-width='1.2'/><text x='16' y='22' text-anchor='middle' font-family='Georgia,serif' font-size='15' font-style='italic' fill='%23C5A572'>Au</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Noto+Serif+KR:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;--card:#0f0d0a;--card-2:#131210;
  --text:#e8e3d8;--sub:#aaa39a;--muted:#6b655e;
  --gold:#C5A572;--goldB:#E3C187;--goldD:#8a7d6b;
  --goldBorder:rgba(197,165,114,0.22);--goldBorderS:rgba(197,165,114,0.50);
  --goldWash:rgba(197,165,114,0.04);--goldWashS:rgba(197,165,114,0.10);
  --goldGlow:rgba(197,165,114,0.20);--border:rgba(255,255,255,0.08);--red:#c77061;
  --serif:'Cormorant Garamond','Noto Serif KR',Georgia,serif;
  --serifKr:'Noto Serif KR','Cormorant Garamond',Georgia,serif;
  --sans:'Outfit',system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --pad-x:clamp(20px,5.5vw,88px);
  --ease-out:cubic-bezier(0.22,1,0.36,1);
}
*,*::before,*::after{box-sizing:border-box}
body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--serifKr);font-weight:300;-webkit-font-smoothing:antialiased;min-height:100vh;min-width:320px;overflow-x:hidden}
a{color:inherit;text-decoration:none}em{font-style:italic}
::selection{background:rgba(197,165,114,0.30)}

.amb{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 1100px 700px at 50% 0%,rgba(197,165,114,0.08),transparent 65%)}

.nav{position:fixed;top:0;left:0;right:0;z-index:50;padding:16px var(--pad-x);background:linear-gradient(180deg,rgba(10,10,10,0.85),rgba(10,10,10,0));backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);display:flex;justify-content:space-between;align-items:center;gap:12px}
.lockup{display:flex;align-items:center;gap:14px}
.seal{width:34px;height:34px;border:1px solid var(--gold);display:inline-flex;align-items:center;justify-content:center;font-family:var(--serif);font-style:italic;color:var(--gold);font-size:16px;letter-spacing:-0.04em;flex-shrink:0;transition:box-shadow .3s,border-color .3s}
.lockup:hover .seal{box-shadow:0 0 18px var(--goldGlow);border-color:var(--goldB)}
.lockup-text{display:flex;flex-direction:column;line-height:1;min-width:0}
.lockup-text .word{font-family:var(--sans);font-weight:600;font-size:14px;letter-spacing:0.34em;color:var(--text);white-space:nowrap}
.lockup-text .program{font-family:var(--mono);font-weight:400;font-size:8.5px;letter-spacing:0.36em;color:var(--goldD);margin-top:5px;white-space:nowrap}
.lang-toggle{display:inline-flex;align-items:center;gap:0;padding:6px 10px;border:1px solid var(--border)}
.lang-toggle button{background:transparent;border:0;color:var(--muted);font-family:var(--mono);font-size:10.5px;letter-spacing:0.20em;padding:3px 7px;cursor:pointer;transition:color .2s}
.lang-toggle button.active{color:var(--gold)}
.lang-toggle .sep{color:var(--muted);font-size:10.5px}
@media (max-width:640px){.nav{padding:13px var(--pad-x)}.lockup-text .word{font-size:12px}.lockup-text .program{font-size:7.5px}}

.lang-en [data-lang="ko"]{display:none}
.lang-ko [data-lang="en"]{display:none}

.page{position:relative;z-index:2;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:14vh var(--pad-x) 64px}
.card{width:100%;max-width:480px;text-align:center}

.eyebrow{font-family:var(--mono);font-size:10.5px;letter-spacing:0.34em;color:var(--gold);margin-bottom:14px}
.title{font-family:var(--serifKr);font-weight:500;font-size:clamp(34px,5vw,46px);line-height:1.1;letter-spacing:-0.015em;color:var(--text);margin:0 0 12px}
.title em{font-family:var(--serif);font-style:italic;color:var(--gold)}
.lede{font-family:var(--serifKr);font-weight:300;font-size:14.5px;line-height:1.78;color:var(--sub);margin:0 0 36px}
.lede em{font-family:var(--serif);font-style:italic;color:var(--goldB)}

.form{display:flex;flex-direction:column;gap:14px;text-align:left}
.field{display:flex;flex-direction:column;gap:6px}
.label{font-family:var(--mono);font-size:9.5px;letter-spacing:0.28em;color:var(--goldD);text-transform:uppercase}
.input{width:100%;padding:14px 16px;background:var(--card);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:14px;letter-spacing:0.02em;transition:border-color .2s,background .2s;-webkit-appearance:none;appearance:none;border-radius:0}
.input::placeholder{color:var(--muted);font-family:var(--mono);font-size:13px;letter-spacing:0.02em}
.input:focus{outline:none;border-color:var(--goldBorderS);background:var(--card-2)}
.input.error{border-color:var(--red)}

.btn{margin-top:8px;padding:16px 24px;font-family:var(--mono);font-weight:500;font-size:11px;letter-spacing:0.30em;text-transform:uppercase;border:1px solid var(--gold);background:var(--gold);color:var(--bg);transition:all .3s;display:inline-flex;align-items:center;justify-content:center;gap:10px;cursor:pointer}
.btn:hover:not(:disabled){background:var(--goldB);border-color:var(--goldB);box-shadow:0 8px 28px rgba(227,193,135,0.30)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn .arr{font-family:var(--serif);font-size:14px;letter-spacing:0;font-style:italic}

.err{color:var(--red);font-style:italic;font-size:13px;margin-top:4px;min-height:1.2em;text-align:center;font-family:var(--serifKr)}

.foot{margin-top:36px;font-family:var(--mono);font-size:10px;letter-spacing:0.22em;color:var(--muted)}

.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(10,10,10,0.3);border-top-color:var(--bg);border-radius:50%;animation:s 0.8s linear infinite}
@keyframes s{to{transform:rotate(360deg)}}
</style>
</head>
<body class="lang-ko">

<div class="amb"></div>

<header class="nav">
  <a class="lockup" href="/" aria-label="Aurum">
    <span class="seal">Au</span>
    <span class="lockup-text">
      <span class="word">AURUM</span>
      <span class="program">CENTURY · CLUB</span>
    </span>
  </a>
  <div class="lang-toggle" role="group" aria-label="Language">
    <button id="btnEn" type="button">EN</button>
    <span class="sep">·</span>
    <button id="btnKo" type="button" class="active">한</button>
  </div>
</header>

<main class="page">
  <div class="card">

    <div class="eyebrow" data-lang="en">MEMBER · LOG-IN</div>
    <div class="eyebrow" data-lang="ko">파트너 · 로그인</div>

    <h1 class="title">
      <span data-lang="en">The <em>quiet</em> room.</span>
      <span data-lang="ko"><em>조용한</em> 방.</span>
    </h1>

    <p class="lede">
      <span data-lang="en">Private console for the founding partners. <em>Authorized members only.</em></span>
      <span data-lang="ko">창립 파트너 전용 콘솔입니다. <em>승인된 멤버만 접근 가능합니다.</em></span>
    </p>

    <form class="form" id="form" autocomplete="on" novalidate>
      <div class="field">
        <label class="label" for="email" data-lang="en">EMAIL</label>
        <label class="label" for="email" data-lang="ko">이메일</label>
        <input
          class="input" id="email" name="email" type="email"
          placeholder="name@theaurumcc.com"
          autocomplete="username" inputmode="email"
          autocapitalize="off" autocorrect="off" spellcheck="false"
          required
        >
      </div>

      <div class="field">
        <label class="label" for="pw" data-lang="en">PASSWORD</label>
        <label class="label" for="pw" data-lang="ko">비밀번호</label>
        <input
          class="input" id="pw" name="password" type="password"
          placeholder="••••"
          autocomplete="current-password"
          required
        >
      </div>

      <button type="submit" class="btn" id="btn">
        <span class="lbl" data-lang="en">ENTER</span>
        <span class="lbl" data-lang="ko">입장</span>
        <span class="arr">→</span>
      </button>

      <div class="err" id="err" aria-live="polite"></div>
    </form>

    <div class="foot">TACC PTE LTD · CONFIDENTIAL</div>

  </div>
</main>

<script>
(function(){
  // ---------- language toggle ----------
  var html = document.documentElement;
  var body = document.body;
  var btnEn = document.getElementById('btnEn');
  var btnKo = document.getElementById('btnKo');
  function setLang(l){
    body.classList.remove('lang-en','lang-ko');
    body.classList.add('lang-'+l);
    html.lang = l;
    btnEn.classList.toggle('active', l==='en');
    btnKo.classList.toggle('active', l==='ko');
    try{ localStorage.setItem('aurum_lang', l); }catch(e){}
  }
  var saved = 'ko';
  try{ saved = localStorage.getItem('aurum_lang') || 'ko'; }catch(e){}
  setLang(saved);
  btnEn.addEventListener('click', function(){ setLang('en'); });
  btnKo.addEventListener('click', function(){ setLang('ko'); });

  // ---------- helpers ----------
  function $(id){ return document.getElementById(id); }
  function getNext(){
    var p = new URLSearchParams(window.location.search);
    var n = p.get('next') || '/admin';
    // Only allow same-origin relative paths.
    if (!/^\/[^\/]/.test(n)) n = '/admin';
    return n;
  }

  // ---------- if already signed in, jump straight in ----------
  fetch('/api/me', { credentials:'same-origin', cache:'no-store' })
    .then(function(r){ if (r.ok) window.location.replace(getNext()); })
    .catch(function(){});

  // ---------- submit ----------
  var form = $('form');
  var emailEl = $('email');
  var pwEl = $('pw');
  var btn = $('btn');
  var err = $('err');

  function clearErr(){
    err.textContent = '';
    emailEl.classList.remove('error');
    pwEl.classList.remove('error');
  }
  emailEl.addEventListener('input', clearErr);
  pwEl.addEventListener('input', clearErr);

  form.addEventListener('submit', async function(e){
    e.preventDefault();
    clearErr();

    var email = emailEl.value.trim();
    var password = pwEl.value;
    if (!email || !password) {
      err.textContent = (body.classList.contains('lang-ko')
        ? '이메일과 비밀번호를 입력해 주세요.'
        : 'Please enter email and password.');
      return;
    }

    btn.disabled = true;
    var origHTML = btn.innerHTML;
    btn.innerHTML = '<span class="spin"></span>';

    try {
      var r = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({ email: email, password: password })
      });
      var j = null;
      try { j = await r.json(); } catch(_) {}
      if (!r.ok) {
        emailEl.classList.add('error');
        pwEl.classList.add('error');
        err.textContent = (body.classList.contains('lang-ko')
          ? '이메일 또는 비밀번호가 올바르지 않습니다.'
          : (j && j.error) ? j.error : 'Incorrect email or password.');
        btn.disabled = false;
        btn.innerHTML = origHTML;
        return;
      }
      // success — wipe pw before navigating, just in case
      pwEl.value = '';
      window.location.replace(getNext());
    } catch (e) {
      err.textContent = (body.classList.contains('lang-ko')
        ? '연결에 문제가 있습니다. 다시 시도해 주세요.'
        : 'Connection problem. Try again.');
      btn.disabled = false;
      btn.innerHTML = origHTML;
    }
  });
})();
</script>

</body>
</html>
