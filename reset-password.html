<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5">
<meta name="theme-color" content="#0a0a0a">
<meta name="robots" content="noindex, nofollow">
<title>Reset password · The Aurum Century Club</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%230a0a0a'/><rect x='4' y='4' width='24' height='24' fill='none' stroke='%23C5A572' stroke-width='1.2'/><text x='16' y='22' text-anchor='middle' font-family='Georgia,serif' font-size='15' font-style='italic' fill='%23C5A572'>Au</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Noto+Serif+KR:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--text:#e8e3d8;--sub:#aaa39a;--muted:#6b655e;--gold:#C5A572;--goldB:#E3C187;--goldD:#8a7d6b;--goldDeep:#6a5a3a;--goldBorder:rgba(197,165,114,0.22);--goldBorderS:rgba(197,165,114,0.50);--goldWash:rgba(197,165,114,0.04);--border:rgba(255,255,255,0.08);--red:#c77061;--serif:'Cormorant Garamond','Noto Serif KR',Georgia,serif;--sans:'Outfit',system-ui,sans-serif;--mono:'JetBrains Mono',ui-monospace,monospace}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--serif);font-weight:300;-webkit-font-smoothing:antialiased;min-height:100vh}
.wrap{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:48px 24px;max-width:540px;margin:0 auto}
.lockup{display:flex;align-items:center;gap:14px;margin-bottom:48px}
.seal{width:42px;height:42px;border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-style:italic;color:var(--gold);font-size:20px;letter-spacing:-0.04em}
.lockup-text{display:flex;flex-direction:column;line-height:1}
.word{font-family:var(--sans);font-weight:600;font-size:16px;letter-spacing:0.34em;color:var(--text)}
.program{font-family:var(--mono);font-weight:400;font-size:9px;letter-spacing:0.36em;color:var(--goldDeep);margin-top:7px}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:0.34em;color:var(--gold);margin-bottom:14px;text-transform:uppercase}
h1{font-family:var(--serif);font-weight:500;font-size:42px;line-height:1.1;letter-spacing:-0.01em;margin:0 0 14px}
h1 em{font-style:italic;color:var(--gold)}
.lede{color:var(--sub);font-size:17px;line-height:1.6;margin:0 0 32px;max-width:440px}
form{width:100%;max-width:440px;display:flex;flex-direction:column;gap:18px}
label{display:flex;flex-direction:column;gap:8px}
.label-text{font-family:var(--mono);font-size:9.5px;letter-spacing:0.30em;color:var(--goldD);text-transform:uppercase}
input{padding:14px 16px;background:var(--bg);border:1px solid var(--goldBorderS);color:var(--text);font-family:var(--mono);font-size:16px;outline:none;transition:border-color .15s}
input#code{font-size:22px;letter-spacing:0.32em;text-align:center}
input:focus{border-color:var(--gold)}
input.error{border-color:var(--red)}
.hint{font-family:var(--serif);font-style:italic;font-size:13px;color:var(--muted)}
.btn{padding:14px 24px;background:var(--gold);color:var(--bg);border:0;font-family:var(--mono);font-size:11px;letter-spacing:0.30em;font-weight:600;text-transform:uppercase;cursor:pointer;margin-top:10px}
.btn:hover{background:var(--goldB)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.err{color:var(--red);font-size:14px;font-family:var(--serif);min-height:20px}
.foot{margin-top:48px;font-family:var(--mono);font-size:9px;letter-spacing:0.30em;color:var(--goldDeep);text-align:center}
.success{padding:18px;border:1px solid var(--goldBorderS);background:var(--goldWash);color:var(--gold);font-family:var(--serif);font-size:16px;text-align:center;margin-bottom:22px}
.hidden{display:none}
</style>
</head>
<body>
<main class="wrap">
  <div class="lockup">
    <div class="seal"><em>Au</em></div>
    <div class="lockup-text">
      <span class="word">AURUM</span>
      <span class="program">CENTURY · CLUB</span>
    </div>
  </div>

  <div id="form-state">
    <div class="eyebrow">Reset password · 비밀번호 재설정</div>
    <h1>Enter your <em>code.</em></h1>
    <p class="lede">Enter the 6-digit code from your email along with your new password.</p>

    <form id="reset-form" autocomplete="off" novalidate>
      <label>
        <span class="label-text">Email</span>
        <input type="email" id="email" required autocomplete="email" inputmode="email">
      </label>
      <label>
        <span class="label-text">6-digit code</span>
        <input type="text" id="code" required maxlength="6" inputmode="numeric" pattern="[0-9]{6}" autocomplete="one-time-code">
      </label>
      <label>
        <span class="label-text">New password</span>
        <input type="password" id="pw" required autocomplete="new-password" minlength="8">
        <span class="hint">8+ characters.</span>
      </label>
      <label>
        <span class="label-text">Confirm new password</span>
        <input type="password" id="pw-confirm" required autocomplete="new-password" minlength="8">
      </label>
      <div class="err" id="err"></div>
      <button class="btn" id="submit-btn" type="submit">RESET PASSWORD →</button>
    </form>
  </div>

  <div id="success-state" class="hidden">
    <div class="success">Password reset. Redirecting to your portfolio…</div>
  </div>

  <div class="foot">CONFIDENTIAL  ·  QUALIFIED INVESTORS ONLY</div>
</main>

<script>
(function(){
  var form = document.getElementById('reset-form');
  var emailEl = document.getElementById('email');
  var codeEl = document.getElementById('code');
  var pwEl = document.getElementById('pw');
  var pwCEl = document.getElementById('pw-confirm');
  var errEl = document.getElementById('err');
  var btn = document.getElementById('submit-btn');

  // Pre-fill email from sessionStorage if forgot-password sent us here
  try {
    var stashed = sessionStorage.getItem('aurum_reset_email');
    if (stashed) emailEl.value = stashed;
  } catch (_) {}
  // Or pre-fill from URL ?email=
  try {
    var qe = new URL(location.href).searchParams.get('email');
    if (qe && !emailEl.value) emailEl.value = qe;
  } catch (_) {}

  // Force numeric only on code input
  codeEl.addEventListener('input', function(){
    codeEl.value = codeEl.value.replace(/\D/g, '').slice(0, 6);
  });

  form.addEventListener('submit', async function(e){
    e.preventDefault();
    errEl.textContent = '';
    [emailEl, codeEl, pwEl, pwCEl].forEach(function(el){ el.classList.remove('error'); });

    var email = emailEl.value.trim().toLowerCase();
    var code = codeEl.value.trim();
    var pw = pwEl.value;
    var pwc = pwCEl.value;

    if (!email) { emailEl.classList.add('error'); errEl.textContent = 'Email is required.'; return; }
    if (code.length !== 6) { codeEl.classList.add('error'); errEl.textContent = 'Code must be 6 digits.'; return; }
    if (pw.length < 8) { pwEl.classList.add('error'); errEl.textContent = 'Password must be at least 8 characters.'; return; }
    if (pw !== pwc) { pwCEl.classList.add('error'); errEl.textContent = 'Passwords do not match.'; return; }

    btn.disabled = true; btn.textContent = 'RESETTING…';
    try {
      var r = await fetch('/api/login?op=password-reset-confirm', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ email: email, code: code, password: pw, confirm: pwc })
      });
      var j = await r.json().catch(function(){ return {}; });
      if (r.ok && j.ok) {
        try { sessionStorage.removeItem('aurum_reset_email'); } catch (_) {}
        document.getElementById('form-state').classList.add('hidden');
        document.getElementById('success-state').classList.remove('hidden');
        setTimeout(function(){ window.location.replace(j.redirect || '/portfolio'); }, 1200);
        return;
      }
      btn.disabled = false; btn.textContent = 'RESET PASSWORD →';
      errEl.textContent = (j && j.error) || 'Could not reset. Check the code and try again.';
    } catch (err) {
      btn.disabled = false; btn.textContent = 'RESET PASSWORD →';
      errEl.textContent = 'Network error. Try again.';
    }
  });
})();
</script>
</body>
</html>
