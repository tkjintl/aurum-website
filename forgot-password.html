<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5">
<meta name="theme-color" content="#0a0a0a">
<meta name="robots" content="noindex, nofollow">
<title>Forgot password · The Aurum Century Club</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%230a0a0a'/><rect x='4' y='4' width='24' height='24' fill='none' stroke='%23C5A572' stroke-width='1.2'/><text x='16' y='22' text-anchor='middle' font-family='Georgia,serif' font-size='15' font-style='italic' fill='%23C5A572'>Au</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Noto+Serif+KR:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--text:#e8e3d8;--sub:#aaa39a;--muted:#6b655e;--gold:#C5A572;--goldB:#E3C187;--goldD:#8a7d6b;--goldDeep:#6a5a3a;--goldBorder:rgba(197,165,114,0.22);--goldBorderS:rgba(197,165,114,0.50);--goldWash:rgba(197,165,114,0.04);--border:rgba(255,255,255,0.08);--red:#c77061;--serif:'Cormorant Garamond','Noto Serif KR',Georgia,serif;--sans:'Outfit',system-ui,sans-serif;--mono:'JetBrains Mono',ui-monospace,monospace}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--serif);font-weight:300;-webkit-font-smoothing:antialiased;min-height:100vh}
.wrap{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:48px 24px;max-width:540px;margin:0 auto}
.lockup{display:flex;align-items:center;gap:14px;margin-bottom:48px}
.seal{width:42px;height:42px;border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-style:italic;color:var(--gold);font-size:20px;letter-spacing:-0.04em}
.lockup-text{display:flex;flex-direction:column;line-height:1}
.word{font-family:var(--sans);font-weight:600;font-size:15px;letter-spacing:0.34em;color:var(--text)}
.program{font-family:var(--mono);font-weight:400;font-size:9px;letter-spacing:0.36em;color:var(--goldDeep);margin-top:7px}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:0.34em;color:var(--gold);margin-bottom:14px;text-transform:uppercase}
h1{font-family:var(--serif);font-weight:500;font-size:42px;line-height:1.1;letter-spacing:-0.01em;margin:0 0 14px}
h1 em{font-style:italic;color:var(--gold)}
.lede{color:var(--sub);font-size:17px;line-height:1.6;margin:0 0 32px;max-width:440px}
form{width:100%;max-width:440px;display:flex;flex-direction:column;gap:18px}
label{display:flex;flex-direction:column;gap:8px}
.label-text{font-family:var(--mono);font-size:9.5px;letter-spacing:0.30em;color:var(--goldD);text-transform:uppercase}
input{padding:14px 16px;background:var(--bg);border:1px solid var(--goldBorderS);color:var(--text);font-family:var(--mono);font-size:15px;outline:none;transition:border-color .15s}
input:focus{border-color:var(--gold)}
.btn{padding:14px 24px;background:var(--gold);color:var(--bg);border:0;font-family:var(--mono);font-size:11px;letter-spacing:0.30em;font-weight:600;text-transform:uppercase;cursor:pointer;margin-top:10px}
.btn:hover{background:var(--goldB)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.err{color:var(--red);font-size:14px;font-family:var(--serif);min-height:20px}
.foot{margin-top:48px;font-family:var(--mono);font-size:9px;letter-spacing:0.30em;color:var(--goldDeep);text-align:center}
.success{padding:18px;border:1px solid var(--goldBorderS);background:var(--goldWash);color:var(--gold);font-family:var(--serif);font-size:16px;line-height:1.5;text-align:center;margin-bottom:22px}
.linkish{color:var(--gold);text-decoration:none;border-bottom:1px solid var(--goldBorderS);padding-bottom:1px;font-family:var(--mono);font-size:10px;letter-spacing:0.20em;text-transform:uppercase;display:inline-block;margin-top:24px}
.linkish:hover{color:var(--goldB);border-color:var(--gold)}
</style>
</head>
<body>
<main class="wrap">
  <div class="lockup">
    <div class="seal"><em>Au</em></div>
    <div class="lockup-text">
      <span class="word">AURUM</span>
      <span class="program">CENTURY · CLUB</span>
    </div>
  </div>

  <div id="form-state">
    <div class="eyebrow">Forgot password · 비밀번호 찾기</div>
    <h1>Reset by <em>email.</em></h1>
    <p class="lede">Enter your registered email. We'll send a 6-digit code that expires in 15 minutes.</p>

    <form id="reset-form" autocomplete="off" novalidate>
      <label>
        <span class="label-text">Email</span>
        <input type="email" id="email" required autocomplete="email" inputmode="email">
      </label>
      <div class="err" id="err"></div>
      <button class="btn" id="submit-btn" type="submit">SEND RESET CODE →</button>
    </form>
  </div>

  <div id="success-state" style="display:none">
    <div class="success">If an account exists for that email, a reset code is on its way.<br/>Check your inbox.</div>
    <a href="/reset-password" class="linkish">I HAVE A CODE  →</a>
  </div>

  <div class="foot">CONFIDENTIAL  ·  QUALIFIED INVESTORS ONLY</div>
</main>

<script>
(function(){
  var form = document.getElementById('reset-form');
  var emailEl = document.getElementById('email');
  var errEl = document.getElementById('err');
  var btn = document.getElementById('submit-btn');

  form.addEventListener('submit', async function(e){
    e.preventDefault();
    errEl.textContent = '';
    var email = emailEl.value.trim().toLowerCase();
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      errEl.textContent = 'Enter a valid email address.';
      return;
    }
    btn.disabled = true; btn.textContent = 'SENDING…';
    try {
      var r = await fetch('/api/login?op=password-reset-request', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ email: email })
      });
      // Always show success regardless of response (anti-enumeration)
      document.getElementById('form-state').style.display = 'none';
      document.getElementById('success-state').style.display = 'block';
      // Stash the email for the next page
      try { sessionStorage.setItem('aurum_reset_email', email); } catch (_) {}
    } catch (err) {
      btn.disabled = false; btn.textContent = 'SEND RESET CODE →';
      errEl.textContent = 'Network error. Try again.';
    }
  });
})();
</script>
</body>
</html>
